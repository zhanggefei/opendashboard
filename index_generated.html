<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>OpenDashboard - 任务管理面板</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 身份技能展示样式 */
        .skills-section {
            margin: 30px 0;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(102, 126, 234, 0.15);
            border: 2px solid rgba(102, 126, 234, 0.2);
        }
        .skills-section h3 {
            margin-bottom: 20px;
            color: #333;
            font-size: 20px;
            font-weight: 600;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.2);
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .skill-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f3f4f6 100%);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
        }
        .skill-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.25);
        }
        .skill-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .skill-icon {
            font-size: 24px;
        }
        .skill-name {
            font-weight: 600;
            color: #333;
            font-size: 15px;
        }
        .skill-level {
            font-size: 12px;
            color: #667eea;
            font-weight: bold;
            margin-left: auto;
        }
        .skill-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
        }
        .skill-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        /* 身份页签样式 */
        .identity-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            padding: 15px 10px;
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }
        .identity-tab {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border: 2px solid #e5e7eb;
            font-weight: 600;
            font-size: 14px;
            background: white;
            color: #555;
        }
        .identity-tab:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .identity-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 头部布局 */
        .header-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        #lastUpdate {
            color: #666;
            font-size: 13px;
            margin-right: auto;
        }
        
        /* 按钮组（靠右） */
        .header-actions {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }
        
        /* 定时任务按钮样式 */
        .header-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-block;
        }
        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-content">
                <h1>🎯 OpenDashboard</h1>
                <p class="subtitle">任务执行看板</p>
                <div class="header-meta">
                    <span id="lastUpdate">最后更新：--</span>
                    <div class="header-actions">
                        <a href="skills.html" class="header-btn" title="OpenClaw 技能中心">🔧 技能中心</a>
                        <a href="cron_manager.html" class="header-btn" title="定时任务管理">⏰ 定时任务</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- 身份页签 -->
        <div class="identity-tabs" id="identityTabs"></div>

        <!-- 身份技能展示区域 -->
        <div class="skills-section" id="skillsSection" style="display: none;">
            <h3>🎯 当前身份技能</h3>
            <div id="skillsList" class="skills-grid"></div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card done">
                <div class="stat-number" id="statDone">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-card progress">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔄 执行中</div>
            </div>
            <div class="stat-card todo">
                <div class="stat-number" id="statTodo">0</div>
                <div class="stat-label">🆕 待办</div>
            </div>
        </div>

        <!-- 当前任务 -->
        <div class="tasks-section" style="background:linear-gradient(135deg,#eff6ff 0%,#dbeafe 100%);border-radius:15px;padding:25px;">
            <div class="section-header" style="margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <h2 style="margin:0;">🔄 执行中</h2>
                    <span style="background:#3b82f6;color:white;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;" id="progressCount">2个</span>
                </div>
                <span style="font-size:12px;color:#6b7280;">当前正在执行的任务</span>
            </div>
            <div id="taskList"></div>
        </div>
        
        <!-- 待办任务 -->
        <div class="tasks-section" style="background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);border-radius:15px;padding:25px;">
            <div class="section-header" style="margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <h2 style="margin:0;">🆕 待办任务</h2>
                    <span style="background:#f59e0b;color:white;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;" id="todoCount">0个</span>
                </div>
                <span style="font-size:12px;color:#6b7280;">等待执行的任务队列</span>
            </div>
            <div id="todoTaskList"></div>
        </div>
        
        <!-- 已完成任务 -->
        <div class="tasks-section" style="background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%);border-radius:15px;padding:25px;">
            <div class="section-header" style="margin-bottom:20px;">
                <div style="display:flex;align-items:center;gap:10px;">
                    <h2 style="margin:0;">✅ 最近完成</h2>
                    <span style="background:#10b981;color:white;padding:4px 12px;border-radius:12px;font-size:11px;font-weight:700;" id="completedCount">2个</span>
                </div>
                <span style="font-size:12px;color:#6b7280;">显示最近完成的 10 个任务</span>
            </div>
            <div id="completedTaskList"></div>
        </div>
    </div>

    <script src="js/identity.js?v=2026030511"></script>
    
    <script>
        // 内联统计数据（优先显示）
        window.INLINE_STATS = { progress: 2, todo: 0, done: 2 };
        console.log('📊 内联统计数据:', window.INLINE_STATS);
    </script>
    
    <script>
        // 内联统计数据（优先显示）
        window.INLINE_STATS = { progress: 2, todo: 0, done: 2 };
        console.log('📊 内联统计数据:', window.INLINE_STATS);
    </script>
    
    <script>
        // 内联统计数据（优先显示）
        window.INLINE_STATS = { progress: 2, todo: 0, done: 2 };
        console.log('📊 内联统计数据:', window.INLINE_STATS);
    </script>
    <script src="js/app.js?v=2026030511"></script>
    <script>
        // 页面加载时主动刷新数据
        async function refreshDataOnLoad() {
            console.log('🔄 页面加载，获取最新数据...');
            
            try {
                // 触发后台刷新脚本
                fetch('/refresh_data.sh').catch(() => {});
                
                // 等待 500ms 后加载任务（给刷新脚本时间）
                setTimeout(async () => {
                    // 初始化身份管理（确保在 loadTasks 之前）
                    if (!window.identityManager) {
                        window.identityManager = new IdentityManager();
                    }
                    renderIdentityTabs();
                    
                    // 技能区域默认隐藏，点击身份后才显示
                    const skillsSection = document.getElementById('skillsSection');
                    if (skillsSection) {
                        skillsSection.style.display = 'none';
                    }
                    
                    // 加载任务
                    await loadTasks();
                    
                    // 额外确保统计数据正确显示（延迟执行）
                    setTimeout(() => {
                        if (window.dashboardStatistics) {
                            const progressEl = document.getElementById('progressCount');
                            const todoEl = document.getElementById('todoCount');
                            const completedEl = document.getElementById('completedCount');
                            
                            console.log('🔧 强制更新统计:', window.dashboardStatistics);
                            
                            if (progressEl) progressEl.textContent = `${window.dashboardStatistics.progress}个`;
                            if (todoEl) todoEl.textContent = `${window.dashboardStatistics.todo}个`;
                            if (completedEl) completedEl.textContent = `${window.dashboardStatistics.done}个`;
                        }
                    }, 1000);
                    
                }, 500);
            } catch (error) {
                console.error('刷新数据失败:', error);
                loadTasks();
            }
        }
        
        refreshDataOnLoad();
    </script>
</body>
</html>
