<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDashboard - 任务管理面板</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-content">
                <h1>🎯 OpenDashboard</h1>
                <p class="subtitle">任务执行看板</p>
                <div class="header-meta">
                    <span id="lastUpdate">最后更新：--</span>
                    <button class="icon-btn" onclick="showIdentityPanel()" title="身份管理">👤</button>
                    <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
                </div>
            </div>
        </header>

        <!-- 身份管理面板 -->
        <div id="identityPanel" style="display: none;">
            <div class="panel-header">
                <h2>👤 身份管理</h2>
                <button class="btn-close" onclick="toggleIdentityPanel()">✕</button>
            </div>
            <div id="identityList" class="identity-grid"></div>
            <div id="taskList" class="task-grid"></div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card done">
                <div class="stat-number" id="statDone">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-card progress">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔄 执行中</div>
            </div>
            <div class="stat-card todo">
                <div class="stat-number" id="statTodo">0</div>
                <div class="stat-label">🆕 待办</div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>📋 全部任务</h2>
            </div>
            <div id="taskList" class="task-list"></div>
        </div>
    </div>

    <script src="js/identity.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 初始化身份管理
        window.identityManager = new IdentityManager();
        loadTasks();
    </script>
</body>
</html>
