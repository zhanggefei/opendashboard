<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDashboard - 任务管理面板</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 身份页签样式 */
        .identity-tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            padding: 15px 10px;
            overflow-x: auto;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid rgba(102, 126, 234, 0.3);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.15);
        }
        .identity-tab {
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            border: 2px solid #e5e7eb;
            font-weight: 600;
            font-size: 14px;
            background: white;
            color: #555;
        }
        .identity-tab:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .identity-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        /* 头部布局 */
        .header-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }
        #lastUpdate {
            color: #666;
            font-size: 13px;
        }
        
        /* 定时任务按钮样式 */
        .header-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-block;
            margin-left: auto;
        }
        .header-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-content">
                <h1>🎯 OpenDashboard</h1>
                <p class="subtitle">任务执行看板</p>
                <div class="header-meta">
                    <span id="lastUpdate">最后更新：--</span>
                    <a href="skills.html" class="header-btn" title="OpenClaw 技能中心">🔧 技能中心</a>
                    <a href="cron_manager.html" class="header-btn" title="定时任务管理">⏰ 定时任务</a>
                </div>
            </div>
        </header>

        <!-- 身份页签 -->
        <div class="identity-tabs" id="identityTabs"></div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card done">
                <div class="stat-number" id="statDone">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-card progress">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔄 执行中</div>
            </div>
            <div class="stat-card todo">
                <div class="stat-number" id="statTodo">0</div>
                <div class="stat-label">🆕 待办</div>
            </div>
        </div>

        <!-- 任务列表 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>📋 全部任务</h2>
            </div>
            <div id="taskList" class="task-list"></div>
        </div>
    </div>

    <script src="js/identity.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 初始化身份管理
        window.identityManager = new IdentityManager();
        renderIdentityTabs();
        loadTasks();
    </script>
</body>
</html>
