<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenDashboard - 任务管理面板</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js 用于数据可视化 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
    <!-- 深色模式切换按钮 -->
    <button class="dark-mode-toggle" onclick="toggleDarkMode()" title="切换深色模式">🌙</button>
    
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-content">
                <h1>🎯 OpenDashboard</h1>
                <p class="subtitle">OpenClaw 任务管理可视化面板</p>
                <div class="header-meta">
                    <span id="lastUpdate">最后更新：--</span>
                    <button class="icon-btn" onclick="toggleNotifications()" title="通知设置">🔔</button>
                    <button class="icon-btn" onclick="showIdentityPanel()" title="身份管理">👤</button>
                    <button class="icon-btn" onclick="showTemplatesModal()" title="任务模板">📋</button>
                    <button class="icon-btn" onclick="showExportModal()" title="导出数据">📥</button>
                    <button class="icon-btn" onclick="showAnalyticsModal()" title="数据报表">📊</button>
                    <button class="refresh-btn" onclick="loadTasks()">🔄 刷新</button>
                </div>
            </div>
        </header>

        <!-- 身份管理面板 -->
        <div id="identityPanel" style="display: none;">
            <div class="panel-header">
                <h2>👤 身份管理</h2>
                <button class="btn-close" onclick="toggleIdentityPanel()">✕</button>
            </div>
            <div id="identityList" class="identity-grid"></div>
            <div id="taskList" class="task-grid"></div>
        </div>

        <!-- 提醒通知容器 -->
        <div id="reminderContainer"></div>

        <!-- 筛选搜索栏 -->
        <div class="filter-bar">
            <div class="filter-group">
                <label>🔍 搜索:</label>
                <input type="text" id="searchInput" placeholder="搜索任务标题、描述..." oninput="applyFilters()">
            </div>
            
            <div class="filter-group">
                <label>状态:</label>
                <select id="statusFilter" onchange="applyFilters()">
                    <option value="all">全部</option>
                    <option value="todo">待办</option>
                    <option value="progress">进行中</option>
                    <option value="blocked">阻塞</option>
                    <option value="done">已完成</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>优先级:</label>
                <select id="priorityFilter" onchange="applyFilters()">
                    <option value="all">全部</option>
                    <option value="P0">P0 紧急重要</option>
                    <option value="P1">P1 重要</option>
                    <option value="P2">P2 普通</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label>负责人:</label>
                <select id="assigneeFilter" onchange="applyFilters()">
                    <option value="all">全部</option>
                </select>
            </div>
            
            <div class="filter-actions">
                <button class="filter-btn" onclick="clearFilters()">清空筛选</button>
                <span class="result-count" id="resultCount">显示 0/0 任务</span>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="stats">
            <div class="stat-card done" onclick="filterByStatus('done')" style="cursor: pointer;" title="点击筛选已完成任务">
                <div class="stat-number" id="statDone">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-card progress" onclick="filterByStatus('progress')" style="cursor: pointer;" title="点击筛选进行中任务">
                <div class="stat-number" id="statProgress">0</div>
                <div class="stat-label">🔄 进行中</div>
            </div>
            <div class="stat-card todo" onclick="filterByStatus('todo')" style="cursor: pointer;" title="点击筛选待办任务">
                <div class="stat-number" id="statTodo">0</div>
                <div class="stat-label">🆕 待办</div>
            </div>
            <div class="stat-card blocked" onclick="filterByStatus('blocked')" style="cursor: pointer;" title="点击筛选阻塞任务">
                <div class="stat-number" id="statBlocked">0</div>
                <div class="stat-label">⏸️ 阻塞</div>
            </div>
        </div>

        <!-- 数据图表 -->
        <div class="charts-container">
            <div class="chart-card">
                <h3>📊 任务状态分布</h3>
                <canvas id="statusChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <h3>🎯 优先级分布</h3>
                <canvas id="priorityChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <h3>👤 负责人任务量</h3>
                <canvas id="assigneeChart" class="chart-canvas"></canvas>
            </div>
            <div class="chart-card">
                <h3>📈 完成进度趋势</h3>
                <canvas id="progressChart" class="chart-canvas"></canvas>
            </div>
        </div>

        <!-- 批量操作栏 -->
        <div class="batch-actions" id="batchActions" style="display: none;">
            <span class="selected-count" id="selectedCount">已选择 0 个任务</span>
            <button class="batch-btn" onclick="batchUpdateStatus('todo')">设为待办</button>
            <button class="batch-btn" onclick="batchUpdateStatus('progress')">设为进行中</button>
            <button class="batch-btn" onclick="batchUpdateStatus('done')">设为完成</button>
            <button class="batch-btn danger" onclick="batchDelete()">删除</button>
            <button class="batch-btn" onclick="cancelBatch()">取消</button>
        </div>

        <!-- 进行中任务 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>🔄 进行中任务</h2>
                <label class="batch-select">
                    <input type="checkbox" onchange="toggleSectionSelect('progress', this.checked)"> 全选
                </label>
            </div>
            <div id="progressTasks" class="task-list"></div>
        </div>

        <!-- 待办任务 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>🆕 待办任务</h2>
                <label class="batch-select">
                    <input type="checkbox" onchange="toggleSectionSelect('todo', this.checked)"> 全选
                </label>
            </div>
            <div id="todoTasks" class="task-list"></div>
        </div>

        <!-- 阻塞任务 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>⏸️ 阻塞任务</h2>
                <label class="batch-select">
                    <input type="checkbox" onchange="toggleSectionSelect('blocked', this.checked)"> 全选
                </label>
            </div>
            <div id="blockedTasks" class="task-list"></div>
        </div>

        <!-- 已完成任务 -->
        <div class="tasks-section">
            <div class="section-header">
                <h2>✅ 已完成任务</h2>
                <label class="batch-select">
                    <input type="checkbox" onchange="toggleSectionSelect('done', this.checked)"> 全选
                </label>
            </div>
            <div id="doneTasks" class="task-list"></div>
        </div>

        <!-- 导出模态框 -->
        <div id="exportModal" class="modal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>📥 导出数据</h3>
                    <button class="modal-close" onclick="closeExportModal()">✕</button>
                </div>
                <div class="modal-body">
                    <div class="export-options">
                        <div class="export-option">
                            <h4>📄 JSON 格式</h4>
                            <p>导出完整任务数据（包含所有字段）</p>
                            <button class="btn-primary" onclick="exportToJSON()">下载 JSON</button>
                        </div>
                        <div class="export-option">
                            <h4>📊 CSV 格式</h4>
                            <p>导出为表格格式，可用于 Excel</p>
                            <button class="btn-primary" onclick="exportToCSV()">下载 CSV</button>
                        </div>
                        <div class="export-option">
                            <h4>📑 PDF 报告</h4>
                            <p>生成美观的 PDF 报表</p>
                            <button class="btn-primary" onclick="exportToPDF()">下载 PDF</button>
                        </div>
                    </div>
                    
                    <div class="export-filters">
                        <h4>筛选选项</h4>
                        <label><input type="checkbox" id="exportAll" checked onchange="toggleExportFilters()"> 导出全部任务</label>
                        <div id="exportFilterOptions" style="display: none; margin-top: 10px;">
                            <label><input type="checkbox" id="exportDone"> 已完成</label>
                            <label><input type="checkbox" id="exportProgress"> 进行中</label>
                            <label><input type="checkbox" id="exportTodo"> 待办</label>
                            <label><input type="checkbox" id="exportBlocked"> 阻塞</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/dependencies.js"></script>
    <script src="js/comments.js"></script>
    <script src="js/subtasks.js"></script>
    <script src="js/analytics.js"></script>
    <script src="js/templates.js"></script>
    <script src="js/timetracking.js"></script>
    <script src="js/tags.js"></script>
    <script src="js/bulk-ops.js"></script>
    <script src="js/activity-log.js"></script>
    <script src="js/import-export.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/gestures.js"></script>
    <script src="js/voice-input.js"></script>
    <script src="js/openclaw.js"></script>
    <script src="js/identity.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 初始化身份管理
        window.identityManager = new IdentityManager();
        addSampleTasks();
        renderIdentities();
        renderTasks();
    </script>
</body>
</html>
