<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理 - OpenDashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .cron-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .cron-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e5e7eb;
        }
        .cron-header h1 {
            color: #333;
            font-size: 24px;
        }
        .refresh-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .cron-grid {
            display: grid;
            gap: 20px;
        }
        .cron-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f3f4f6 100%);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
        }
        .cron-card:hover {
            border-color: #667eea;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
        }
        .cron-card.active {
            border-left: 4px solid #10b981;
        }
        .cron-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }
        .cron-icon {
            font-size: 32px;
        }
        .cron-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            flex: 1;
        }
        .cron-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .cron-status.active {
            background: rgba(16, 185, 129, 0.15);
            color: #059669;
        }
        .cron-status.pending {
            background: rgba(107, 114, 128, 0.15);
            color: #6b7280;
        }
        .cron-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(102, 126, 234, 0.2);
        }
        .cron-info-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .cron-info-label {
            font-size: 12px;
            color: #6b7280;
            font-weight: 500;
        }
        .cron-info-value {
            font-size: 14px;
            color: #1f2937;
            font-family: monospace;
        }
        .cron-description {
            color: #6b7280;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .cron-schedule {
            background: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
            display: inline-block;
            margin-top: 5px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn" style="display:inline-block;padding:10px 20px;background:#f5f5f5;color:#333;text-decoration:none;border-radius:8px;margin-bottom:20px;">← 返回主页</a>
        
        <div class="cron-container">
            <div class="cron-header">
                <h1>⏰ 定时任务管理</h1>
                <button class="refresh-btn" onclick="loadCronJobs()">🔄 刷新</button>
            </div>
            
            <div id="cronList" class="cron-grid"></div>
        </div>
    </div>

    <script>
        // 从云端加载定时任务
        async function loadCronJobs() {
            try {
                const response = await fetch('tasks/cron_jobs.json');
                if (!response.ok) throw new Error('无法加载任务数据');
                
                const data = await response.json();
                renderCronJobs(data.jobs || []);
            } catch (error) {
                console.error('加载定时任务失败:', error);
                document.getElementById('cronList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <p>无法加载定时任务数据</p>
                        <p style="font-size:12px;margin-top:10px;">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderCronJobs(jobs) {
            const container = document.getElementById('cronList');
            
            if (jobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>暂无定时任务</h3>
                        <p>还没有配置任何定时任务</p>
                    </div>
                `;
                return;
            }

            const icons = {
                '飞书': '📧',
                'Alpaca': '📈',
                'OpenDashboard': '📊',
                '健康': '🏥',
                '股票': '💰',
                '交易': '💹',
                '同步': '🔄'
            };

            const html = jobs.map(job => {
                const icon = Object.entries(icons).find(([key]) => job.name.includes(key))?.[1] || '⏰';
                const nextRun = job.state?.nextRunAtMs ? new Date(job.state.nextRunAtMs).toLocaleString('zh-CN') : '未设置';
                const lastRun = job.state?.lastRunAtMs ? new Date(job.state.lastRunAtMs).toLocaleString('zh-CN') : '未执行';
                const status = job.enabled ? 'active' : 'pending';
                const statusText = job.enabled ? '✅ 已启用' : '⏸️ 已暂停';

                return `
                    <div class="cron-card ${status}">
                        <div class="cron-card-header">
                            <span class="cron-icon">${icon}</span>
                            <span class="cron-name">${job.name}</span>
                            <span class="cron-status ${status}">${statusText}</span>
                        </div>
                        <p class="cron-description">${job.description || '暂无描述'}</p>
                        <div>
                            <span class="cron-schedule">${job.schedule?.expr || job.schedule || '未知'}</span>
                        </div>
                        <div class="cron-info">
                            <div class="cron-info-item">
                                <span class="cron-info-label">🕐 下次执行</span>
                                <span class="cron-info-value">${nextRun}</span>
                            </div>
                            <div class="cron-info-item">
                                <span class="cron-info-label">📝 最后执行</span>
                                <span class="cron-info-value">${lastRun}</span>
                            </div>
                            <div class="cron-info-item">
                                <span class="cron-info-label">⚙️ 时区</span>
                                <span class="cron-info-value">${job.timezone || 'Asia/Shanghai'}</span>
                            </div>
                            ${job.state?.lastRunStatus ? `
                            <div class="cron-info-item">
                                <span class="cron-info-label">✅ 最后状态</span>
                                <span class="cron-info-value">${job.state.lastRunStatus}</span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        // 页面加载时获取任务
        document.addEventListener('DOMContentLoaded', loadCronJobs);
    </script>
</body>
</html>
