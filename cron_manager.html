<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理 - OpenDashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .page-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .page-header h1 {
            color: #2c3e50;
            font-size: 32px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .page-header p {
            color: #7f8c8d;
            font-size: 16px;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .stat-number {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .cron-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .cron-grid {
            display: grid;
            gap: 20px;
        }
        
        .cron-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f3f4f6 100%);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 15px;
            padding: 25px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .cron-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        }
        
        .cron-card.paused::before {
            background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%);
        }
        
        .cron-card:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.25);
        }
        
        .cron-card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .cron-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
        }
        
        .cron-name {
            font-size: 20px;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
        }
        
        .cron-status {
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .cron-status.active {
            background: linear-gradient(135deg, #d5f5e3 0%, #abebc6 100%);
            color: #059669;
        }
        
        .cron-status.paused {
            background: linear-gradient(135deg, #fadbd8 0%, #f5b7b1 100%);
            color: #c0392b;
        }
        
        .cron-description {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .cron-schedule {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 15px 20px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 20px;
            display: inline-block;
        }
        
        .cron-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            padding-top: 20px;
            border-top: 2px solid rgba(102, 126, 234, 0.15);
        }
        
        .cron-info-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .cron-info-label {
            font-size: 12px;
            color: #95a5a6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .cron-info-value {
            font-size: 15px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 25px;
        }
        
        .empty-state h3 {
            font-size: 24px;
            color: #7f8c8d;
            margin-bottom: 10px;
        }
        
        .last-update {
            text-align: right;
            color: #95a5a6;
            font-size: 13px;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 24px;
            }
            
            .stats-bar {
                grid-template-columns: 1fr;
            }
            
            .cron-info {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1>
                ⏰ 定时任务管理
            </h1>
            <p>实时监控 OpenClaw 所有定时任务的执行状态</p>
            
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">
                    ← 返回主页
                </a>
                <button class="btn btn-primary" onclick="loadCronJobs()">
                    🔄 刷新数据
                </button>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">📋 总任务数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statActive">0</div>
                <div class="stat-label">✅ 运行中</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statPaused">0</div>
                <div class="stat-label">⏸️ 已暂停</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statNext">-</div>
                <div class="stat-label">⏰ 下次执行</div>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="cron-container">
            <div id="cronList" class="cron-grid"></div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        let cronJobs = [];

        async function loadCronJobs() {
            try {
                const response = await fetch('tasks/cron_jobs.json?' + Date.now());
                if (!response.ok) throw new Error('无法加载任务数据');
                
                const data = await response.json();
                cronJobs = data.jobs || [];
                renderCronJobs();
                updateStats();
                
                document.getElementById('lastUpdate').textContent = 
                    `最后更新：${new Date().toLocaleTimeString('zh-CN')}`;
            } catch (error) {
                console.error('加载定时任务失败:', error);
                document.getElementById('cronList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>无法加载定时任务数据</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function renderCronJobs() {
            const container = document.getElementById('cronList');
            
            if (cronJobs.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>暂无定时任务</h3>
                        <p>还没有配置任何定时任务</p>
                    </div>
                `;
                return;
            }

            const icons = {
                '飞书': '📧',
                'CRM': '📊',
                'Alpaca': '📈',
                'OpenDashboard': '📊',
                '狗蛋': '🤖',
                '思考': '💭',
                '早晨': '🌅',
                '晚上': '🌙',
                '同步': '🔄'
            };

            const html = cronJobs.map(job => {
                const name = job.name;
                const icon = Object.entries(icons).find(([key]) => name.includes(key))?.[1] || '⏰';
                const schedule = job.schedule?.expr || job.schedule || '未知';
                const enabled = job.enabled !== false;
                const statusClass = enabled ? 'active' : 'paused';
                const statusText = enabled ? '运行中' : '已暂停';
                
                const nextRun = job.state?.nextRunAtMs ? 
                    new Date(job.state.nextRunAtMs).toLocaleString('zh-CN') : '未设置';
                const lastRun = job.state?.lastRunAtMs ? 
                    new Date(job.state.lastRunAtMs).toLocaleString('zh-CN') : '从未执行';
                const lastStatus = job.state?.lastRunStatus || job.state?.lastStatus || '-';

                return `
                    <div class="cron-card ${statusClass}">
                        <div class="cron-card-header">
                            <div class="cron-icon">${icon}</div>
                            <div class="cron-name">${name}</div>
                            <div class="cron-status ${statusClass}">${statusText}</div>
                        </div>
                        
                        <p class="cron-description">${job.description || '暂无描述'}</p>
                        
                        <div class="cron-schedule">
                            📅 ${schedule}
                        </div>
                        
                        <div class="cron-info">
                            <div class="cron-info-item">
                                <span class="cron-info-label">🕐 下次执行</span>
                                <span class="cron-info-value">${nextRun}</span>
                            </div>
                            <div class="cron-info-item">
                                <span class="cron-info-label">📝 最后执行</span>
                                <span class="cron-info-value">${lastRun}</span>
                            </div>
                            <div class="cron-info-item">
                                <span class="cron-info-label">✅ 最后状态</span>
                                <span class="cron-info-value">${lastStatus}</span>
                            </div>
                            <div class="cron-info-item">
                                <span class="cron-info-label">⚙️ 时区</span>
                                <span class="cron-info-value">${job.timezone || 'Asia/Shanghai'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function updateStats() {
            const total = cronJobs.length;
            const active = cronJobs.filter(j => j.enabled !== false).length;
            const paused = total - active;
            
            // 计算下次执行时间（最近的）
            let nextRunTime = null;
            cronJobs.forEach(job => {
                if (job.enabled !== false && job.state?.nextRunAtMs) {
                    if (!nextRunTime || job.state.nextRunAtMs < nextRunTime) {
                        nextRunTime = job.state.nextRunAtMs;
                    }
                }
            });
            
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statActive').textContent = active;
            document.getElementById('statPaused').textContent = paused;
            document.getElementById('statNext').textContent = nextRunTime ? 
                new Date(nextRunTime).toLocaleTimeString('zh-CN', {hour: '2-digit', minute:'2-digit'}) : '-';
        }

        // 页面加载时获取任务
        document.addEventListener('DOMContentLoaded', loadCronJobs);
        
        // 每 30 秒自动刷新
        setInterval(loadCronJobs, 30000);
    </script>
</body>
</html>
