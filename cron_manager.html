<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时任务管理 - OpenDashboard</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .cron-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid #667eea;
        }
        .cron-card.active {
            border-left-color: #10b981;
        }
        .cron-card.paused {
            border-left-color: #f59e0b;
        }
        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #f5f5f5;
            color: #333;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">← 返回主页</a>
        
        <div class="header">
            <h1>⏰ 定时任务管理</h1>
            <p>管理和监控所有定时任务的执行情况</p>
        </div>
        
        <div id="cronList"></div>
    </div>

    <script>
        // 定时任务数据
        let cronJobs = [
            {
                id: 1,
                name: 'Alpaca 股票日报',
                schedule: '0 7 * * *',
                description: '每天早上 7 点发送 Alpaca 股票盈亏日报到飞书',
                command: 'python3 /root/alpaca_daily_report.py',
                status: 'active',
                lastRun: '2026-03-03 07:00:00',
                nextRun: '2026-03-04 07:00:00',
                totalRuns: 2,
                successRate: 100,
                logs: [
                    { time: '2026-03-03 07:00:15', status: 'success', message: '日报发送成功' }
                ]
            },
            {
                id: 2,
                name: '美股自动交易',
                schedule: '30 21 * * *',
                description: '每晚 21:30 执行 Alpaca 自动交易策略',
                command: 'python3 /root/alpaca_auto_trade.py',
                status: 'active',
                lastRun: '2026-03-02 21:30:00',
                nextRun: '2026-03-03 21:30:00',
                totalRuns: 1,
                successRate: 100,
                logs: [
                    { time: '2026-03-02 21:30:25', status: 'success', message: '执行 7 笔交易，全部成功' }
                ]
            },
            {
                id: 3,
                name: '飞书渠道健康检查',
                schedule: '*/5 * * * *',
                description: '每 5 分钟检查飞书渠道连接状态',
                command: 'bash /root/feishu_healthcheck.sh',
                status: 'active',
                lastRun: '2026-03-04 01:55:00',
                nextRun: '2026-03-04 02:00:00',
                totalRuns: 288,
                successRate: 99,
                logs: [
                    { time: '2026-03-04 01:55:00', status: 'success', message: '渠道正常' }
                ]
            }
        ];

        function renderCronJobs() {
            const container = document.getElementById('cronList');
            if (!container) return;

            let html = '';
            cronJobs.forEach(job => {
                const statusClass = job.status === 'active' ? 'active' : 'paused';
                const statusBadge = job.status === 'active' 
                    ? '<span style="background: #10b981; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">✅ 运行中</span>'
                    : '<span style="background: #f59e0b; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px;">⏸️ 已暂停</span>';

                html += `
                    <div class="cron-card ${statusClass}">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <div>
                                <div style="font-size: 18px; font-weight: 600; color: #1a1a1a;">${job.name}</div>
                                <div style="color: #666; font-size: 14px; margin-top: 5px;">${job.description}</div>
                            </div>
                            ${statusBadge}
                        </div>
                        <div style="background: #f5f5f5; padding: 8px 12px; border-radius: 6px; font-family: monospace; color: #667eea; font-size: 13px;">
                            📅 ${job.schedule}
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 15px;">
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: bold; color: #667eea;">🕐 ${job.lastRun.split(' ')[1] || '-'}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 4px;">上次执行</div>
                            </div>
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: bold; color: #667eea;">⏰ ${job.nextRun.split(' ')[1] || '-'}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 4px;">下次执行</div>
                            </div>
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: bold; color: #667eea;">${job.totalRuns}</div>
                                <div style="font-size: 12px; color: #666; margin-top: 4px;">总执行次数</div>
                            </div>
                            <div style="background: #f8f9fa; padding: 12px; border-radius: 8px; text-align: center;">
                                <div style="font-size: 24px; font-weight: bold; color: ${job.successRate >= 95 ? '#10b981' : '#f59e0b'}">${job.successRate}%</div>
                                <div style="font-size: 12px; color: #666; margin-top: 4px;">成功率</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 15px;">
                            <button class="btn btn-primary" onclick="toggleJob(${job.id})">${job.status === 'active' ? '暂停' : '启动'}</button>
                            <button class="btn btn-danger" onclick="deleteJob(${job.id})">删除</button>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function toggleJob(id) {
            const job = cronJobs.find(j => j.id === id);
            if (job) {
                job.status = job.status === 'active' ? 'paused' : 'active';
                renderCronJobs();
            }
        }

        function deleteJob(id) {
            if (confirm('确定要删除这个定时任务吗？')) {
                cronJobs = cronJobs.filter(j => j.id !== id);
                renderCronJobs();
                alert('✅ 删除成功！');
            }
        }

        // 初始化
        renderCronJobs();
    </script>
</body>
</html>
