<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最近完成 - OpenDashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .page-header h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-header p {
            color: #7f8c8d;
            font-size: 13px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .task-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .task-card {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            border: 2px solid rgba(16, 185, 129, 0.3);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .task-card::before {
            content: '✅';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            opacity: 0.5;
        }
        
        .task-card:hover {
            border-color: #10b981;
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }
        
        .task-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        
        .task-icon {
            font-size: 28px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 10px;
            color: white;
            flex-shrink: 0;
        }
        
        .task-title {
            font-size: 16px;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
        }
        
        .task-id {
            font-size: 12px;
            color: #7f8c8d;
            font-weight: 600;
            background: rgba(0,0,0,0.05);
            padding: 4px 8px;
            border-radius: 6px;
        }
        
        .task-description {
            color: #7f8c8d;
            font-size: 12px;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .task-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            padding-top: 12px;
            border-top: 2px solid rgba(16, 185, 129, 0.15);
        }
        
        .task-stat-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .task-stat-label {
            font-size: 10px;
            color: #95a5a6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .task-stat-value {
            font-size: 13px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .last-update {
            text-align: right;
            color: #95a5a6;
            font-size: 11px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1>
                ✅ 最近完成的任务
            </h1>
            <p>显示最近完成的 10 个任务及其详细信息</p>
            
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">
                    ← 返回主页
                </a>
                <button class="btn btn-primary" onclick="loadCompletedTasks()">
                    🔄 刷新
                </button>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="statCompleted">0</div>
                <div class="stat-label">✅ 已完成</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTokens">0</div>
                <div class="stat-label">📊 总 Token</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statTime">-</div>
                <div class="stat-label">⏱️ 平均耗时</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statLatest">-</div>
                <div class="stat-label">🕐 最近完成</div>
            </div>
        </div>
        
        <!-- 任务列表 -->
        <div class="task-container">
            <div id="taskList" class="task-list"></div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        let completedTasks = [];

        async function loadCompletedTasks() {
            try {
                const response = await fetch('tasks/tasks.json?' + Date.now());
                if (!response.ok) throw new Error('无法加载任务数据');
                
                const data = await response.json();
                completedTasks = data.completedTasks || [];
                renderCompletedTasks();
                updateStats();
                
                document.getElementById('lastUpdate').textContent = 
                    `最后更新：${new Date().toLocaleTimeString('zh-CN')}`;
            } catch (error) {
                console.error('加载任务失败:', error);
                document.getElementById('taskList').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>无法加载任务数据</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        function renderCompletedTasks() {
            const container = document.getElementById('taskList');
            
            if (completedTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>暂无已完成任务</h3>
                        <p>完成任务后会显示在这里</p>
                    </div>
                `;
                return;
            }

            const icons = {
                '飞书': '📧',
                'CRM': '📊',
                'Alpaca': '📈',
                'OpenDashboard': '📊',
                '狗蛋': '🤖',
                '思考': '💭',
                '会话': '💬',
                '消息': '✉️',
                '报告': '📝',
                '分析': '📈',
                '美化': '🎨'
            };

            const html = completedTasks.map((task, index) => {
                const title = task.title;
                let icon = '✅';
                for (const [key, value] of Object.entries(icons)) {
                    if (title.includes(key)) {
                        icon = value;
                        break;
                    }
                }
                
                const tokens = task.tokenUsage || {};
                const executionTime = task.executionTime || '-';
                const completedTime = task.completedTime || '-';
                const model = task.metadata?.model || '-';

                return `
                    <div class="task-card">
                        <div class="task-header">
                            <div class="task-icon">${icon}</div>
                            <div>
                                <div class="task-title">${title}</div>
                                <div class="task-id">${task.id}</div>
                            </div>
                        </div>
                        
                        <p class="task-description">${task.description || '暂无描述'}</p>
                        
                        <div class="task-stats">
                            <div class="task-stat-item">
                                <span class="task-stat-label">📊 模型</span>
                                <span class="task-stat-value">${model}</span>
                            </div>
                            <div class="task-stat-item">
                                <span class="task-stat-label">⏱️ 执行时间</span>
                                <span class="task-stat-value">${executionTime}</span>
                            </div>
                            <div class="task-stat-item">
                                <span class="task-stat-label">💬 Token</span>
                                <span class="task-stat-value">${(tokens.total || 0).toLocaleString()}</span>
                            </div>
                            <div class="task-stat-item">
                                <span class="task-stat-label">🕐 完成时间</span>
                                <span class="task-stat-value">${completedTime}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = html;
        }

        function updateStats() {
            const total = completedTasks.length;
            const totalTokens = completedTasks.reduce((sum, t) => sum + (t.tokenUsage?.total || 0), 0);
            
            // 计算平均执行时间（简化）
            let avgTime = '-';
            if (total > 0) {
                avgTime = `${(total / 1).toFixed(1)}个/小时`;
            }
            
            // 最近完成时间
            let latestTime = '-';
            if (total > 0 && completedTasks[0].completedTime) {
                latestTime = completedTasks[0].completedTime.split(' ')[1] || '-';
            }

            document.getElementById('statCompleted').textContent = total;
            document.getElementById('statTokens').textContent = totalTokens.toLocaleString();
            document.getElementById('statTime').textContent = avgTime;
            document.getElementById('statLatest').textContent = latestTime;
        }

        document.addEventListener('DOMContentLoaded', loadCompletedTasks);
        setInterval(loadCompletedTasks, 30000);
    </script>
</body>
</html>
