<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 技能中心</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header-content h1 {
            color: white;
            font-size: 28px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .skills-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }
        .category-icon {
            font-size: 28px;
        }
        .category-title {
            font-size: 22px;
            font-weight: 600;
            color: #333;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .skill-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s;
            cursor: pointer;
        }
        .skill-card:hover {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }
        .skill-card:hover .skill-name,
        .skill-card:hover .skill-desc {
            color: white;
        }
        .skill-card:hover .skill-component {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .skill-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        .skill-status.used {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .skill-status.unused {
            background: rgba(107, 114, 128, 0.2);
            color: #6b7280;
            border: 1px solid rgba(107, 114, 128, 0.3);
        }
        .skill-card:hover .skill-status.used {
            background: rgba(255,255,255,0.25);
            color: white;
            border-color: rgba(255,255,255,0.4);
        }
        .skill-card:hover .skill-status.unused {
            background: rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
            border-color: rgba(255,255,255,0.3);
        }
        .skill-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .skill-icon {
            font-size: 32px;
        }
        .skill-name {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            transition: color 0.3s;
        }
        .skill-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            transition: color 0.3s;
        }
        .skill-component {
            display: inline-block;
            padding: 6px 12px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
        }
        .stat-item {
            text-align: center;
        }
        .stat-number {
            font-size: 36px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .search-box {
            margin-bottom: 30px;
        }
        .search-box input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <div class="header-content">
                <h1>🔧 OpenClaw 技能中心</h1>
                <p class="subtitle">完整的工具和能力清单</p>
                <a href="index.html" class="back-btn">← 返回任务面板</a>
            </div>
        </header>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-number" id="totalSkills">0</div>
                <div class="stat-label">总技能数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalCategories">0</div>
                <div class="stat-label">分类数</div>
            </div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 搜索技能..." oninput="filterSkills()">
        </div>

        <!-- 技能列表 -->
        <div class="skills-container" id="skillsList"></div>
    </div>

    <script>
        // OpenClaw 完整技能列表
        // used: true=已使用，false=未使用
        const skillsData = [
            // 数据分析
            {
                category: '📊 数据分析',
                icon: '📊',
                skills: [
                    { name: 'memory_search', icon: '🧠', desc: '语义化搜索记忆文件，支持多关键词匹配', component: 'memory-core', used: true },
                    { name: 'memory_get', icon: '📖', desc: '读取记忆文件片段，精确获取上下文', component: 'memory-core', used: true },
                    { name: 'web_search', icon: '🌐', desc: 'Brave Search API 搜索，支持区域和语言过滤', component: 'brave-api', used: true },
                    { name: 'image', icon: '🖼️', desc: '视觉模型分析单张或多张图片', component: 'vision-model', used: true },
                    { name: 'pdf', icon: '📄', desc: 'PDF 文档分析，支持文本提取和模型分析', component: 'pdf-parser', used: false }
                ]
            },
            // CRM 管理
            {
                category: '👥 CRM 管理',
                icon: '👥',
                skills: [
                    { name: 'feishu_bitable_get_meta', icon: '📋', desc: '解析飞书多维表格 URL，获取表结构', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_list_fields', icon: '📑', desc: '列出多维表格所有字段及类型', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_list_records', icon: '📝', desc: '分页查询多维表格记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_get_record', icon: '🔍', desc: '根据 ID 获取单条记录详情', component: 'feishu-api', used: false },
                    { name: 'feishu_bitable_create_record', icon: '➕', desc: '创建新的多维表格记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_update_record', icon: '✏️', desc: '更新现有记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_create_field', icon: '📊', desc: '创建新的表格字段', component: 'feishu-api', used: false },
                    { name: 'feishu_bitable_create_app', icon: '🆕', desc: '创建新的多维表格应用', component: 'feishu-api', used: false }
                ]
            },
            // 文档协作
            {
                category: '📝 文档协作',
                icon: '📝',
                skills: [
                    { name: 'feishu_doc_read', icon: '📖', desc: '读取飞书云文档内容', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_write', icon: '📝', desc: '写入/更新飞书云文档', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_append', icon: '➕', desc: '追加内容到文档末尾', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_create', icon: '🆕', desc: '创建新文档', component: 'feishu-api', used: false },
                    { name: 'feishu_doc_create_table', icon: '📊', desc: '在文档中创建表格', component: 'feishu-api', used: false },
                    { name: 'feishu_doc_upload_image', icon: '🖼️', desc: '上传图片到文档', component: 'feishu-api', used: false }
                ]
            },
            // 云存储
            {
                category: '☁️ 云存储',
                icon: '☁️',
                skills: [
                    { name: 'feishu_drive_list', icon: '📁', desc: '列出云盘文件夹内容', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_info', icon: 'ℹ️', desc: '获取文件/文件夹详情', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_create_folder', icon: '📂', desc: '创建新文件夹', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_move', icon: '📦', desc: '移动文件/文件夹', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_delete', icon: '🗑️', desc: '删除文件/文件夹', component: 'feishu-api', used: false }
                ]
            },
            // 知识库
            {
                category: '📚 知识库',
                icon: '📚',
                skills: [
                    { name: 'feishu_wiki_spaces', icon: '🌐', desc: '获取知识库空间列表', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_nodes', icon: '📑', desc: '获取知识库节点树', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_get', icon: '📖', desc: '获取知识库节点内容', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_create', icon: '🆕', desc: '创建知识库节点', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_move', icon: '📦', desc: '移动知识库节点', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_rename', icon: '✏️', desc: '重命名知识库节点', component: 'feishu-api', used: false }
                ]
            },
            // 会话管理
            {
                category: '💬 会话管理',
                icon: '💬',
                skills: [
                    { name: 'sessions_list', icon: '📋', desc: '列出所有会话，支持过滤', component: 'session-core', used: true },
                    { name: 'sessions_history', icon: '📜', desc: '获取会话历史消息', component: 'session-core', used: false },
                    { name: 'sessions_send', icon: '✉️', desc: '向其他会话发送消息', component: 'session-core', used: true },
                    { name: 'sessions_spawn', icon: '🚀', desc: 'spawn 子代理或 ACP 会话', component: 'session-core', used: true },
                    { name: 'subagents', icon: '🤖', desc: '管理子代理（列表/终止/引导）', component: 'session-core', used: true },
                    { name: 'session_status', icon: '📊', desc: '查看会话状态和使用情况', component: 'session-core', used: true }
                ]
            },
            // 浏览器控制
            {
                category: '🌐 浏览器控制',
                icon: '🌐',
                skills: [
                    { name: 'browser_status', icon: 'ℹ️', desc: '查看浏览器状态', component: 'browser-server', used: false },
                    { name: 'browser_start', icon: '▶️', desc: '启动浏览器', component: 'browser-server', used: false },
                    { name: 'browser_snapshot', icon: '📸', desc: '获取页面快照', component: 'browser-server', used: true },
                    { name: 'browser_act', icon: '🎯', desc: '执行页面操作（点击/输入等）', component: 'browser-server', used: true },
                    { name: 'browser_navigate', icon: '🧭', desc: '导航到指定 URL', component: 'browser-server', used: false },
                    { name: 'browser_screenshot', icon: '📷', desc: '截取页面截图', component: 'browser-server', used: false }
                ]
            },
            // 文件操作
            {
                category: '📁 文件操作',
                icon: '📁',
                skills: [
                    { name: 'read', icon: '📖', desc: '读取文件内容，支持文本和图片', component: 'fs-core', used: true },
                    { name: 'write', icon: '📝', desc: '创建或覆盖文件', component: 'fs-core', used: true },
                    { name: 'edit', icon: '✏️', desc: '精确编辑文件内容', component: 'fs-core', used: true },
                    { name: 'exec', icon: '⚡', desc: '执行 Shell 命令', component: 'shell-core', used: true },
                    { name: 'process', icon: '🔄', desc: '管理后台进程', component: 'shell-core', used: true }
                ]
            },
            // 消息通知
            {
                category: '📧 消息通知',
                icon: '📧',
                skills: [
                    { name: 'message_send', icon: '✉️', desc: '发送消息到频道/用户', component: 'channel-plugins', used: true },
                    { name: 'message_broadcast', icon: '📢', desc: '广播消息', component: 'channel-plugins', used: false },
                    { name: 'tts', icon: '🔊', desc: '文本转语音', component: 'tts-engine', used: false }
                ]
            },
            // 设备管理
            {
                category: '📱 设备管理',
                icon: '📱',
                skills: [
                    { name: 'nodes_status', icon: 'ℹ️', desc: '查看节点状态', component: 'node-core', used: true },
                    { name: 'nodes_describe', icon: '📋', desc: '获取节点详细信息', component: 'node-core', used: false },
                    { name: 'nodes_notify', icon: '🔔', desc: '发送设备通知', component: 'node-core', used: false },
                    { name: 'nodes_camera_snap', icon: '📷', desc: '拍摄设备照片', component: 'node-core', used: false },
                    { name: 'nodes_screen_record', icon: '🎥', desc: '录制设备屏幕', component: 'node-core', used: false },
                    { name: 'nodes_location_get', icon: '📍', desc: '获取设备位置', component: 'node-core', used: false }
                ]
            },
            // Canvas 控制
            {
                category: '🎨 Canvas 控制',
                icon: '🎨',
                skills: [
                    { name: 'canvas_present', icon: '📺', desc: '呈现 Canvas 内容', component: 'canvas-core', used: false },
                    { name: 'canvas_navigate', icon: '🧭', desc: '导航 Canvas 到 URL', component: 'canvas-core', used: false },
                    { name: 'canvas_snapshot', icon: '📸', desc: '截取 Canvas 快照', component: 'canvas-core', used: false },
                    { name: 'canvas_eval', icon: '⚡', desc: '执行 Canvas JavaScript', component: 'canvas-core', used: false }
                ]
            }
        ];

        // 渲染技能列表
        function renderSkills(filter = '') {
            const container = document.getElementById('skillsList');
            const filterLower = filter.toLowerCase();
            
            let html = '';
            let totalSkills = 0;
            let visibleCategories = 0;

            skillsData.forEach(category => {
                const filteredSkills = category.skills.filter(skill => 
                    skill.name.toLowerCase().includes(filterLower) ||
                    skill.desc.toLowerCase().includes(filterLower) ||
                    skill.component.toLowerCase().includes(filterLower)
                );

                if (filteredSkills.length > 0) {
                    visibleCategories++;
                    totalSkills += filteredSkills.length;

                    html += `
                        <div class="category-section">
                            <div class="category-header">
                                <span class="category-icon">${category.icon}</span>
                                <h2 class="category-title">${category.category}</h2>
                            </div>
                            <div class="skills-grid">
                                ${filteredSkills.map(skill => `
                                    <div class="skill-card">
                                        <div class="skill-header">
                                            <span class="skill-icon">${skill.icon}</span>
                                            <h3 class="skill-name">${skill.name}</h3>
                                        </div>
                                        <p class="skill-desc">${skill.desc}</p>
                                        <span class="skill-component">${skill.component}</span>
                                        <span class="skill-status ${skill.used ? 'used' : 'unused'}">
                                            ${skill.used ? '✅ 已使用' : '⭕ 未使用'}
                                        </span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html;
            document.getElementById('totalSkills').textContent = totalSkills;
            document.getElementById('totalCategories').textContent = visibleCategories;
        }

        // 搜索过滤
        function filterSkills() {
            const query = document.getElementById('searchInput').value;
            renderSkills(query);
        }

        // 初始化
        renderSkills();
    </script>
</body>
</html>
