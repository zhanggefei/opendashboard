<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能中心 - OpenDashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            background: white;
            border-radius: 15px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .page-header h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .page-header p {
            color: #7f8c8d;
            font-size: 13px;
        }
        
        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }
        
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #7f8c8d;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .skills-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .search-box {
            margin-bottom: 20px;
        }
        
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #f9fafb;
        }
        
        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        .category-section {
            margin-bottom: 25px;
        }
        
        .category-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(102, 126, 234, 0.15);
        }
        
        .category-icon {
            font-size: 28px;
        }
        
        .category-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
        }
        
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }
        
        .skill-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f3f4f6 100%);
            border: 2px solid rgba(102, 126, 234, 0.2);
            border-radius: 10px;
            padding: 12px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .skill-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        }
        
        .skill-card.unused::before {
            background: linear-gradient(180deg, #9ca3af 0%, #6b7280 100%);
        }
        
        .skill-card:hover {
            border-color: #667eea;
            transform: translateX(3px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        
        .skill-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        .skill-icon {
            font-size: 24px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            flex-shrink: 0;
        }
        
        .skill-name {
            font-size: 14px;
            font-weight: 700;
            color: #2c3e50;
            flex: 1;
        }
        
        .skill-status {
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }
        
        .skill-status.used {
            background: linear-gradient(135deg, #d5f5e3 0%, #abebc6 100%);
            color: #059669;
        }
        
        .skill-status.unused {
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            color: #6b7280;
        }
        
        .skill-desc {
            color: #7f8c8d;
            font-size: 11px;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .skill-component {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            padding: 6px 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #667eea;
            font-weight: 600;
            display: inline-block;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #95a5a6;
        }
        
        .empty-state-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .last-update {
            text-align: right;
            color: #95a5a6;
            font-size: 11px;
            margin-top: 15px;
        }
        
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 20px;
            }
            
            .skills-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <div class="page-header">
            <h1>
                🔧 OpenClaw 技能中心
            </h1>
            <p>完整的工具和能力清单，共 60+ 个技能</p>
            
            <div class="header-actions">
                <a href="index.html" class="btn btn-secondary">
                    ← 返回主页
                </a>
                <button class="btn btn-primary" onclick="renderSkills()">
                    🔄 刷新
                </button>
            </div>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-number" id="statTotal">0</div>
                <div class="stat-label">📚 总技能数</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statUsed">0</div>
                <div class="stat-label">✅ 已使用</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statUnused">0</div>
                <div class="stat-label">⭕ 未使用</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="statCategories">0</div>
                <div class="stat-label">📂 分类数</div>
            </div>
        </div>
        
        <!-- 搜索框 -->
        <div class="skills-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 搜索技能名称、描述或组件..." oninput="renderSkills()">
            </div>
            
            <!-- 技能列表 -->
            <div id="skillsList"></div>
            <div class="last-update" id="lastUpdate"></div>
        </div>
    </div>

    <script>
        const skillsData = [
            {
                category: '📊 数据分析',
                icon: '📊',
                skills: [
                    { name: 'memory_search', icon: '🧠', desc: '语义化搜索记忆文件，支持多关键词匹配', component: 'memory-core', used: true },
                    { name: 'memory_get', icon: '📖', desc: '读取记忆文件片段，精确获取上下文', component: 'memory-core', used: true },
                    { name: 'web_search', icon: '🌐', desc: 'Brave Search API 搜索，支持区域和语言过滤', component: 'brave-api', used: true },
                    { name: 'image', icon: '🖼️', desc: '视觉模型分析单张或多张图片', component: 'vision-model', used: true },
                    { name: 'pdf', icon: '📄', desc: 'PDF 文档分析，支持文本提取和模型分析', component: 'pdf-parser', used: false }
                ]
            },
            {
                category: '👥 CRM 管理',
                icon: '👥',
                skills: [
                    { name: 'feishu_bitable_get_meta', icon: '📋', desc: '解析飞书多维表格 URL，获取表结构', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_list_fields', icon: '📑', desc: '列出多维表格所有字段及类型', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_list_records', icon: '📝', desc: '分页查询多维表格记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_get_record', icon: '🔍', desc: '根据 ID 获取单条记录详情', component: 'feishu-api', used: false },
                    { name: 'feishu_bitable_create_record', icon: '➕', desc: '创建新的多维表格记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_update_record', icon: '✏️', desc: '更新现有记录', component: 'feishu-api', used: true },
                    { name: 'feishu_bitable_create_field', icon: '📊', desc: '创建新的表格字段', component: 'feishu-api', used: false },
                    { name: 'feishu_bitable_create_app', icon: '🆕', desc: '创建新的多维表格应用', component: 'feishu-api', used: false }
                ]
            },
            {
                category: '📝 文档协作',
                icon: '📝',
                skills: [
                    { name: 'feishu_doc_read', icon: '📖', desc: '读取飞书云文档内容', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_write', icon: '📝', desc: '写入/更新飞书云文档', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_append', icon: '➕', desc: '追加内容到文档末尾', component: 'feishu-api', used: true },
                    { name: 'feishu_doc_create', icon: '🆕', desc: '创建新文档', component: 'feishu-api', used: false },
                    { name: 'feishu_doc_create_table', icon: '📊', desc: '在文档中创建表格', component: 'feishu-api', used: false },
                    { name: 'feishu_doc_upload_image', icon: '🖼️', desc: '上传图片到文档', component: 'feishu-api', used: false }
                ]
            },
            {
                category: '☁️ 云存储',
                icon: '☁️',
                skills: [
                    { name: 'feishu_drive_list', icon: '📁', desc: '列出云盘文件夹内容', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_info', icon: 'ℹ️', desc: '获取文件/文件夹详情', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_create_folder', icon: '📂', desc: '创建新文件夹', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_move', icon: '📦', desc: '移动文件/文件夹', component: 'feishu-api', used: false },
                    { name: 'feishu_drive_delete', icon: '🗑️', desc: '删除文件/文件夹', component: 'feishu-api', used: false }
                ]
            },
            {
                category: '📚 知识库',
                icon: '📚',
                skills: [
                    { name: 'feishu_wiki_spaces', icon: '🌐', desc: '获取知识库空间列表', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_nodes', icon: '📑', desc: '获取知识库节点树', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_get', icon: '📖', desc: '获取知识库节点内容', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_create', icon: '🆕', desc: '创建知识库节点', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_move', icon: '📦', desc: '移动知识库节点', component: 'feishu-api', used: false },
                    { name: 'feishu_wiki_rename', icon: '✏️', desc: '重命名知识库节点', component: 'feishu-api', used: false }
                ]
            },
            {
                category: '💬 会话管理',
                icon: '💬',
                skills: [
                    { name: 'sessions_list', icon: '📋', desc: '列出所有会话，支持过滤', component: 'session-core', used: true },
                    { name: 'sessions_history', icon: '📜', desc: '获取会话历史消息', component: 'session-core', used: true },
                    { name: 'sessions_send', icon: '✉️', desc: '向其他会话发送消息', component: 'session-core', used: true },
                    { name: 'sessions_spawn', icon: '🚀', desc: 'spawn 子代理或 ACP 会话', component: 'session-core', used: true },
                    { name: 'subagents', icon: '🤖', desc: '管理子代理（列表/终止/引导）', component: 'session-core', used: true },
                    { name: 'session_status', icon: '📊', desc: '查看会话状态和使用情况', component: 'session-core', used: true }
                ]
            },
            {
                category: '🌐 浏览器控制',
                icon: '🌐',
                skills: [
                    { name: 'browser_status', icon: 'ℹ️', desc: '查看浏览器状态', component: 'browser-server', used: false },
                    { name: 'browser_start', icon: '▶️', desc: '启动浏览器', component: 'browser-server', used: false },
                    { name: 'browser_snapshot', icon: '📸', desc: '获取页面快照', component: 'browser-server', used: true },
                    { name: 'browser_act', icon: '🎯', desc: '执行页面操作（点击/输入等）', component: 'browser-server', used: true },
                    { name: 'browser_navigate', icon: '🧭', desc: '导航到指定 URL', component: 'browser-server', used: false },
                    { name: 'browser_screenshot', icon: '📷', desc: '截取页面截图', component: 'browser-server', used: false }
                ]
            },
            {
                category: '📁 文件操作',
                icon: '📁',
                skills: [
                    { name: 'read', icon: '📖', desc: '读取文件内容，支持文本和图片', component: 'fs-core', used: true },
                    { name: 'write', icon: '📝', desc: '创建或覆盖文件', component: 'fs-core', used: true },
                    { name: 'edit', icon: '✏️', desc: '精确编辑文件内容', component: 'fs-core', used: true },
                    { name: 'exec', icon: '⚡', desc: '执行 Shell 命令', component: 'shell-core', used: true },
                    { name: 'process', icon: '🔄', desc: '管理后台进程', component: 'shell-core', used: true }
                ]
            },
            {
                category: '📧 消息通知',
                icon: '📧',
                skills: [
                    { name: 'message_send', icon: '✉️', desc: '发送消息到频道/用户', component: 'channel-plugins', used: true },
                    { name: 'message_broadcast', icon: '📢', desc: '广播消息', component: 'channel-plugins', used: false },
                    { name: 'tts', icon: '🔊', desc: '文本转语音', component: 'tts-engine', used: false }
                ]
            },
            {
                category: '📱 设备管理',
                icon: '📱',
                skills: [
                    { name: 'nodes_status', icon: 'ℹ️', desc: '查看节点状态', component: 'node-core', used: true },
                    { name: 'nodes_describe', icon: '📋', desc: '获取节点详细信息', component: 'node-core', used: false },
                    { name: 'nodes_notify', icon: '🔔', desc: '发送设备通知', component: 'node-core', used: false },
                    { name: 'nodes_camera_snap', icon: '📷', desc: '拍摄设备照片', component: 'node-core', used: false },
                    { name: 'nodes_screen_record', icon: '🎥', desc: '录制设备屏幕', component: 'node-core', used: false },
                    { name: 'nodes_location_get', icon: '📍', desc: '获取设备位置', component: 'node-core', used: false }
                ]
            },
            {
                category: '🎨 Canvas 控制',
                icon: '🎨',
                skills: [
                    { name: 'canvas_present', icon: '📺', desc: '呈现 Canvas 内容', component: 'canvas-core', used: false },
                    { name: 'canvas_navigate', icon: '🧭', desc: '导航 Canvas 到 URL', component: 'canvas-core', used: false },
                    { name: 'canvas_snapshot', icon: '📸', desc: '截取 Canvas 快照', component: 'canvas-core', used: false },
                    { name: 'canvas_eval', icon: '⚡', desc: '执行 Canvas JavaScript', component: 'canvas-core', used: false }
                ]
            }
        ];

        function renderSkills() {
            const container = document.getElementById('skillsList');
            const filter = document.getElementById('searchInput').value.toLowerCase();
            
            let html = '';
            let totalSkills = 0;
            let usedSkills = 0;
            let unusedSkills = 0;
            let visibleCategories = 0;

            skillsData.forEach(category => {
                const filteredSkills = category.skills.filter(skill => 
                    skill.name.toLowerCase().includes(filter) ||
                    skill.desc.toLowerCase().includes(filter) ||
                    skill.component.toLowerCase().includes(filter)
                );

                if (filteredSkills.length > 0) {
                    visibleCategories++;
                    
                    html += `
                        <div class="category-section">
                            <div class="category-header">
                                <span class="category-icon">${category.icon}</span>
                                <h2 class="category-title">${category.category}</h2>
                            </div>
                            <div class="skills-grid">
                                ${filteredSkills.map(skill => {
                                    totalSkills++;
                                    if (skill.used) {
                                        usedSkills++;
                                    } else {
                                        unusedSkills++;
                                    }
                                    
                                    const statusClass = skill.used ? 'used' : 'unused';
                                    const statusText = skill.used ? '已使用' : '未使用';
                                    
                                    return `
                                        <div class="skill-card ${statusClass}">
                                            <div class="skill-header">
                                                <div class="skill-icon">${skill.icon}</div>
                                                <div class="skill-name">${skill.name}</div>
                                                <div class="skill-status ${statusClass}">${statusText}</div>
                                            </div>
                                            <p class="skill-desc">${skill.desc}</p>
                                            <div class="skill-component">${skill.component}</div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }
            });

            container.innerHTML = html || `
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <h3>未找到相关技能</h3>
                    <p>尝试其他关键词搜索</p>
                </div>
            `;
            
            // 更新统计
            document.getElementById('statTotal').textContent = totalSkills;
            document.getElementById('statUsed').textContent = usedSkills;
            document.getElementById('statUnused').textContent = unusedSkills;
            document.getElementById('statCategories').textContent = visibleCategories;
            
            document.getElementById('lastUpdate').textContent = 
                `最后更新：${new Date().toLocaleTimeString('zh-CN')}`;
        }

        // 页面加载时渲染
        document.addEventListener('DOMContentLoaded', renderSkills);
    </script>
</body>
</html>
